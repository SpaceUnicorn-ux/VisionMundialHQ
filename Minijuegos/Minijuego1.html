<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Striker 2026 PRO - FIFA Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;700&family=Source+Sans+3:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --emerald: #10b981;
            --emerald-glow: rgba(16, 185, 129, 0.6);
            --slate-950: #020617;
            --slate-900: #0f172a;
            --red-fail: #ef4444;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050a18;
            font-family: 'Source Sans 3', sans-serif;
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 85vh;
            max-height: 800px;
            background: linear-gradient(180deg, var(--slate-900) 0%, var(--slate-950) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.7);
            padding: 20px;
        }

        /* HUD */
.hud {
    display: flex;
    justify-content: space-between;
    padding: 44px 10px 20px 10px;
}

        .score-item p { font-family: 'Oswald'; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6; text-transform: uppercase; }
        .score-item h2 { font-family: 'Bebas Neue'; font-size: 3.5rem; color: var(--emerald); line-height: 0.9; }

        /* ESCENARIO DE LA PORTERÍA */
        .pitch-area {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .goal {
            position: relative;
            width: 90%;
            height: 200px;
            border: 6px solid rgba(255, 255, 255, 0.2);
            border-bottom: none;
            border-radius: 15px 15px 0 0;
            background: rgba(255, 255, 255, 0.02);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .goal-net {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        /* PORTERO ANIMADO */
        .keeper {
            position: absolute;
            bottom: 0;
            left: 45%;
            width: 50px;
            height: 80px;
            color: var(--white);
            transition: transform 0.1s linear, color 0.3s;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        /* ANIMACIÓN DE GOL */
        #goal-announcement {
            position: absolute;
            top: 40%;
            font-family: 'Bebas Neue';
            font-size: 6rem;
            color: var(--white);
            text-shadow: 0 0 30px var(--emerald);
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.5);
        }

        .goal-pop { animation: goalPopAnim 0.8s cubic-bezier(0.17, 0.89, 0.32, 1.27) forwards; }

        @keyframes goalPopAnim {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            30% { opacity: 1; transform: scale(1.2) rotate(5deg); }
            100% { opacity: 0; transform: scale(1) rotate(0deg); }
        }

        /* BARRA DE POTENCIA (ESTILO MEJORADO) */
        .controls-area {
            padding: 20px 0;
        }

        .power-bar-container {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .track {
            position: relative;
            width: 100%;
            height: 16px;
            background: #111827;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        #target-zone {
            position: absolute;
            height: 100%;
            background: var(--emerald);
            box-shadow: 0 0 20px var(--emerald-glow);
        }

        #cursor {
            position: absolute;
            height: 100%;
            width: 4px;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            z-index: 5;
        }

        /* BOTÓN DE DISPARO */
        #shoot-btn {
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            border: none;
            background: var(--emerald);
            color: white;
            font-family: 'Oswald';
            font-weight: 700;
            font-size: 1.4rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 0 #065f46;
        }

        #shoot-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #065f46;
        }

        /* OVERLAYS */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
        }

        .hidden { display: none !important; }

        .btn-start {
            background: var(--emerald);
            color: white;
            padding: 15px 40px;
            border-radius: 12px;
            font-family: 'Oswald';
            font-weight: 700;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }

        /* ESTADOS DE ÉXITO/FALLO */
        .goal-success { border-color: var(--emerald) !important; box-shadow: 0 0 40px var(--emerald-glow); }
        .keeper-fail { color: var(--red-fail) !important; filter: drop-shadow(0 0 15px var(--red-fail)); transform: scale(1.2); }
    
        .back-link{
    margin-top: 16px;
    color: white;
    text-decoration: none;
    font-family: 'Oswald';
    letter-spacing: 1px;
    opacity: 0.85;
}

@media (max-width: 768px){
    body{
        align-items: stretch;
        overflow: auto;
    }

    #game-container{
        max-width: 100%;
        width: 100%;
        min-height: 100dvh;
        height: auto;
        max-height: none;
        border-radius: 0;
        padding: 16px;
    }

    .hud{
        padding: 12px 4px;
    }

    .score-item h2{
        font-size: 2.7rem;
    }

    .goal{
        height: 180px;
    }

    .controls-area{
        padding: 14px 0 calc(18px + env(safe-area-inset-bottom));
    }

    #shoot-btn{
        padding: 18px;
        font-size: 1.15rem;
    }

    .overlay{
        border-radius: 0;
        padding: 24px;
    }
}

@media (max-width: 420px){
    .score-item h2{
        font-size: 2.2rem;
    }

    .goal{
        height: 155px;
    }

    #goal-announcement{
        font-size: 4.2rem;
    }
}
    
.menu-floating-btn{
    position: absolute;
    top: 16px;
    left: 18px;
    z-index: 120;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: white;
    text-decoration: none;
    font-family: 'Oswald';
    font-size: 0.9rem;
    letter-spacing: 1px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.14);
    opacity: 0.95;
    transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
}

.menu-floating-btn:hover{
    background: rgba(255,255,255,0.16);
    transform: translateY(-1px);
}

.menu-floating-btn:active{
    transform: translateY(1px);
}

@media (max-width: 768px){
    .hud{
        padding: calc(48px + env(safe-area-inset-top)) 4px 12px 4px;
    }

    .menu-floating-btn{
        top: calc(10px + env(safe-area-inset-top));
        left: 12px;
        font-size: 0.82rem;
        padding: 8px 12px;
    }
}

    </style>
</head>
<body>

    <div id="game-container">
        <a href="Portada.html" class="menu-floating-btn" aria-label="Volver al menú principal">← Menú</a>
        <!-- Pantallas -->
        <div id="start-screen" class="overlay">
            <h1 style="font-family: 'Bebas Neue'; font-size: 4rem; margin-bottom: 10px;">STRIKER <span style="color:var(--emerald)">2026</span></h1>
<p style="opacity:0.7">El simulador oficial de penaltis de precisión.</p>
<button class="btn-start" onclick="startGame()">EMPEZAR DESAFÍO</button>
<a href="Portada.html" class="back-link">← VOLVER A MINIJUEGOS</a>
        </div>

<div id="game-over-screen" class="overlay hidden">
    <h1 style="font-family: 'Bebas Neue'; font-size: 4rem; color: var(--red-fail)">¡FALLASTE!</h1>
    <p id="final-score-text">Goles: 0</p>
    <button class="btn-start" style="background: white; color: black;" onclick="startGame()">REINTENTAR</button>
    <a href="Portada.html" class="back-link">← VOLVER AL MENÚ PRINCIPAL</a>
</div>

        <!-- HUD -->
        <div class="hud">
            <div class="score-item">
                <p>GOLES</p>
                <h2 id="score-val">0</h2>
            </div>
            <div class="score-item" style="text-align: right;">
                <p>RÉCORD</p>
                <h2 id="record-val" style="font-size: 2rem;">0</h2>
            </div>
        </div>

        <!-- Pitch -->
        <div class="pitch-area">
            <div id="goal-announcement">¡GOL!</div>
            <div class="goal" id="goal-frame">
                <div class="goal-net"></div>
                <div class="keeper" id="keeper-body">
                    <i data-lucide="shield-alert" style="width: 50px; height: 80px;"></i>
                </div>
            </div>
        </div>

        <!-- Controles -->
        <div class="controls-area">
            <div class="power-bar-container">
                <div style="display: flex; justify-content: space-between; font-family: 'Oswald'; font-size: 0.7rem; opacity: 0.6;">
                    <span>PRECISIÓN DE TIRO</span>
                    <span id="lvl-tag">NIVEL 1</span>
                </div>
                <div class="track">
                    <div id="target-zone"></div>
                    <div id="cursor"></div>
                </div>
            </div>
            <button id="shoot-btn">¡DISPARAR!</button>
            <p style="text-align: center; font-size: 0.6rem; opacity: 0.4; margin-top: 15px; letter-spacing: 1px;">SISTEMA DE PRECISIÓN BIOMÉTRICA FIFA</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let score = 0;
        let record = localStorage.getItem('wc_record') || 0;
        let gameActive = false;
        let cursorX = 0;
        let direction = 1;
        let speed = 2.5;
        let animFrame;

        const cursor = document.getElementById('cursor');
        const target = document.getElementById('target-zone');
        const keeper = document.getElementById('keeper-body');
        const goalFrame = document.getElementById('goal-frame');
        const goalText = document.getElementById('goal-announcement');
        const scoreVal = document.getElementById('score-val');
        const recordVal = document.getElementById('record-val');

        recordVal.innerText = record;

        function update() {
            if (!gameActive) return;

            // Mover cursor
            cursorX += speed * direction;
            if (cursorX >= 100 || cursorX <= 0) direction *= -1;
            cursor.style.left = cursorX + '%';

            // Mover portero sutilmente
            const kPos = 45 + Math.sin(Date.now() / 300) * 20;
            keeper.style.left = kPos + '%';

            animFrame = requestAnimationFrame(update);
        }

function startGame() {
    score = 0;
    speed = 2.6;
    cursorX = 0;
    direction = 1;
    scoreVal.innerText = "0";
    cursor.style.left = "0%";
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-over-screen').classList.add('hidden');
    cancelAnimationFrame(animFrame);
    gameActive = true;
    setNewTarget();
    update();
}

        function setNewTarget() {
            const width = Math.max(8, 22 - score);
            const pos = Math.random() * (100 - width);
            target.style.width = width + '%';
            target.style.left = pos + '%';
            document.getElementById('lvl-tag').innerText = `NIVEL ${Math.floor(score/3) + 1}`;
        }

        function shoot() {
            if (!gameActive) return;

            const cPos = cursorX;
            const tStart = parseFloat(target.style.left);
            const tEnd = tStart + parseFloat(target.style.width);

            if (cPos >= tStart && cPos <= tEnd) {
                processGoal();
            } else {
                processMiss();
            }
        }

        function processGoal() {
            score++;
            speed += 0.35;
            scoreVal.innerText = score;

            // Efectos visuales de GOL
            goalText.classList.remove('goal-pop');
            void goalText.offsetWidth; // Reset animación
            goalText.classList.add('goal-pop');

            goalFrame.classList.add('goal-success');
            keeper.classList.add('keeper-fail');

            setTimeout(() => {
                goalFrame.classList.remove('goal-success');
                keeper.classList.remove('keeper-fail');
            }, 600);

            if (score > record) {
                record = score;
                localStorage.setItem('wc_record', record);
                recordVal.innerText = record;
            }

            setNewTarget();
        }

        function processMiss() {
            gameActive = false;
            cancelAnimationFrame(animFrame);
            document.getElementById('final-score-text').innerText = `CONSEGUISTE ${score} GOLES`;
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        // Eventos
        document.getElementById('shoot-btn').addEventListener('click', shoot);
window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        if (gameActive) shoot();
        else if (
            !document.getElementById('start-screen').classList.contains('hidden') ||
            !document.getElementById('game-over-screen').classList.contains('hidden')
        ) {
            startGame();
        }
    }

    if (e.code === 'Escape') {
        window.location.href = 'Portada.html';
    }
});
    </script>
</body>
</html>
