<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escaner AR Optimizado</title>

<script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: black;
}

#loading {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  background: #000;
  z-index: 999;
}
</style>
</head>

<body>

<div id="loading">Abriendo cámara...</div>

<a-scene
embedded
arjs="sourceType: webcam; debugUIEnabled: false;"
vr-mode-ui="enabled: false"
renderer="antialias: true; alpha: true; precision: mediump;">

<!-- MÉXICO -->
<a-marker type="pattern" url="Marcadores/mexico.patt" id="marker-mx">
  <a-entity id="entidad-mx" scale="3 3 3"></a-entity>
</a-marker>

<!-- JAPÓN -->
<a-marker type="pattern" url="Marcadores/japon.patt" id="marker-jp">
  <a-entity id="entidad-jp" scale="2 2 2"></a-entity>
</a-marker>

<!-- TUNEZ -->
<a-marker type="pattern" url="Marcadores/tunez.patt" id="marker-tn">
  <a-entity id="entidad-tn" scale="0.05 0.05 0.05"></a-entity>
</a-marker>

<!-- SUECIA -->
<a-marker type="pattern" url="Marcadores/suecia.patt" id="marker-se">
  <a-entity id="entidad-se"></a-entity>
</a-marker>

<!-- SUDAFRICA -->
<a-marker type="pattern" url="Marcadores/sudafrica.patt" id="marker-sa">
  <a-entity id="entidad-sa"></a-entity>
</a-marker>

<!-- COREA -->
<a-marker type="pattern" url="Marcadores/surcorea.patt" id="marker-kr">
  <a-entity id="entidad-kr" scale="0.05 0.05 0.05"></a-entity>
</a-marker>

<a-entity camera></a-entity>
</a-scene>

<script>
const loading = document.getElementById("loading");

const modelos = {
  "marker-mx": "Modelos/balon.glb",
  "marker-jp": "Modelos/trofeo.glb",
  "marker-tn": "Modelos/jugador.glb",
  "marker-se": "Modelos/suecia.glb",
  "marker-sa": "Modelos/sudafrica.glb",
  "marker-kr": "Modelos/surcorea.glb"
};

let modeloCargado = {};

document.querySelector("a-scene").addEventListener("renderstart", () => {
  loading.style.display = "none";
});

document.querySelectorAll("a-marker").forEach(marker => {

  marker.addEventListener("markerFound", () => {

    const id = marker.id;
    const entidad = marker.querySelector("a-entity");

    if (!modeloCargado[id]) {

      const ruta = modelos[id];

      console.log("Cargando modelo:", ruta);

      entidad.setAttribute("gltf-model", ruta);
      entidad.setAttribute("animation-mixer", "clip: *; timeScale: 1");

      modeloCargado[id] = true;
    }

  });

});
</script>

</body>
</html>
